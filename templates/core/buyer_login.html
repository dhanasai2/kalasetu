{% extends 'base.html' %}
{% block title %}Buyer Sign In{% endblock %}

{% block content %}
<div class="ks-auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="ks-auth-card">
                    <div class="text-center mb-4">
                        <div class="ks-auth-icon"><i class="bi bi-bag-heart"></i></div>
                        <h2 class="ks-section-title">Welcome Back</h2>
                        <p class="text-muted">Sign in to your buyer account</p>
                    </div>

                    <form method="post" class="ks-form">
                        {% csrf_token %}
                        {% if error %}
                        <div class="alert alert-danger py-2 small">{{ error }}</div>
                        {% endif %}

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="Your password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn ks-btn-primary w-100 mb-3">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                        </button>

                        <p class="text-center text-muted small mb-0">
                            Don't have an account? <a href="{% url 'buyer_register' %}" class="ks-link">Create one</a>
                        </p>
                        <p class="text-center text-muted small mt-2">
                            Are you an artisan? <a href="{% url 'artisan_login' %}" class="ks-link">Artisan login</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
